[build]
  publish = "."

[[redirects]]
  from  = "/daily"
  to    = "/"
  status = 200

[[redirects]]
  from  = "/reports/:date"
  to    = "/reports/:date.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "no-store"
