[build]
  publish = "."

[[redirects]]
  from  = "/daily"
  to    = "/"
  status = 200

[[redirects]]
  from  = "/reports/:date"
  to    = "/reports/:date.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://cassiopee01.netlify.app https://cassiopee-8yv.pages.dev"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "no-store"
