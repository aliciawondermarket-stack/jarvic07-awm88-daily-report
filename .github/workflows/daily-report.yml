name: Daily Intelligence Report

on:
  schedule:
    # 06:00 UTC = 07:00 CET (08:00 CEST in summer)
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --if-present

      - name: Generate daily report
        env:
          WINDSOR_API_KEY:      ${{ secrets.WINDSOR_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_APP_PASSWORD:   ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_USER:           emp25m@gmail.com
          EMAIL_TO:             emp25m@gmail.com
        run: node scripts/generate-report.js

      - name: Commit report to repo
        run: |
          git config user.name  "ARIA · Jarvic07"
          git config user.email "aria@asodi85.ai"
          git add reports/ index.html
          git diff --staged --quiet || git commit -m "📊 Daily report $(date -u +%Y-%m-%d) [auto]"
          git push
